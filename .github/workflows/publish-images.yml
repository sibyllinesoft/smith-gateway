name: Publish Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Go tests
        run: go test ./...

      - name: Build release Rust binaries
        run: cargo build --release --workspace

      - name: Build Go binaries
        run: go build ./...

  build:
    needs: verify
    name: build (${{ matrix.image }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mcp-sidecar
            dockerfile: service/mcp-sidecar/Dockerfile
            legacy_image: ""
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - image: mcp-sidecar
            dockerfile: service/mcp-sidecar/Dockerfile
            legacy_image: ""
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
          - image: api-sidecar
            dockerfile: service/api-sidecar/Dockerfile
            legacy_image: ""
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - image: api-sidecar
            dockerfile: service/api-sidecar/Dockerfile
            legacy_image: ""
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
          - image: pg-auth-gateway
            dockerfile: service/pg-auth-gateway/Dockerfile
            legacy_image: ""
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - image: pg-auth-gateway
            dockerfile: service/pg-auth-gateway/Dockerfile
            legacy_image: ""
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
          - image: catalog
            dockerfile: service/catalog/Dockerfile
            legacy_image: mcp-index
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - image: catalog
            dockerfile: service/catalog/Dockerfile
            legacy_image: mcp-index
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Compute image names
        id: names
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          {
            echo "images<<EOF"
            echo "ghcr.io/${owner}/${{ matrix.image }}"
            if [ -n "${{ matrix.legacy_image }}" ]; then
              echo "ghcr.io/${owner}/${{ matrix.legacy_image }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.names.outputs.images }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Add architecture suffix to tags
        id: arch_tags
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "tags<<EOF"
            while IFS= read -r tag; do
              [ -n "$tag" ] || continue
              echo "${tag}-${ARCH}"
            done <<< "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.arch_tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

  merge:
    name: merge (${{ matrix.image }})
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mcp-sidecar
            legacy_image: ""
          - image: api-sidecar
            legacy_image: ""
          - image: pg-auth-gateway
            legacy_image: ""
          - image: catalog
            legacy_image: mcp-index

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Compute image names
        id: names
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          {
            echo "images<<EOF"
            echo "ghcr.io/${owner}/${{ matrix.image }}"
            if [ -n "${{ matrix.legacy_image }}" ]; then
              echo "ghcr.io/${owner}/${{ matrix.legacy_image }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.names.outputs.images }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Merge manifests
        shell: bash
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker buildx imagetools create \
              -t "$tag" \
              "${tag}-amd64" \
              "${tag}-arm64"
          done <<< "$TAGS"
