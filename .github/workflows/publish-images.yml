name: Publish Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/publish-images.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "service/**"
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mcp-sidecar
            dockerfile: service/mcp-sidecar/Dockerfile
            legacy_image: ""
          - image: api-sidecar
            dockerfile: service/api-sidecar/Dockerfile
            legacy_image: ""
          - image: pg-auth-gateway
            dockerfile: service/pg-auth-gateway/Dockerfile
            legacy_image: ""
          - image: catalog
            dockerfile: service/catalog/Dockerfile
            legacy_image: mcp-index

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Compute image names
        id: names
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          {
            echo "images<<EOF"
            echo "ghcr.io/${owner}/${{ matrix.image }}"
            if [ -n "${{ matrix.legacy_image }}" ]; then
              echo "ghcr.io/${owner}/${{ matrix.legacy_image }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.names.outputs.images }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
