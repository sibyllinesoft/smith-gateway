name: Release CLI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Go tests
        run: go test ./...

      - name: Build release Rust binaries
        run: cargo build --release --workspace

      - name: Build Go binaries
        run: go build ./...

  build:
    name: Build CLI (${{ matrix.goos }}, ${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          binary="smith"
          if [ "$GOOS" = "windows" ]; then
            binary="${binary}.exe"
          fi

          archive_base="smith_${VERSION#v}_${GOOS}_${GOARCH}"
          out_dir="dist/${archive_base}"
          mkdir -p "$out_dir"

          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "${out_dir}/${binary}" \
            ./cmd/smith

          cp LICENSE "$out_dir/"
          cp README.md "$out_dir/"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (
              cd dist
              zip -rq "${archive_base}.zip" "${archive_base}"
            )
            rm -rf "$out_dir"
          else
            tar -C dist -czf "dist/${archive_base}.tar.gz" "${archive_base}"
            rm -rf "$out_dir"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: smith-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > sha256sum.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
