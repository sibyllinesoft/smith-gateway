name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Go tests
        run: go test ./...

      - name: Build release Rust binaries
        run: cargo build --release --workspace

      - name: Build Go binaries
        run: go build ./...

  docker-smoke:
    name: Docker Smoke (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mcp-sidecar
            dockerfile: service/mcp-sidecar/Dockerfile
          - image: api-sidecar
            dockerfile: service/api-sidecar/Dockerfile
          - image: catalog
            dockerfile: service/catalog/Dockerfile
          - image: pg-auth-gateway
            dockerfile: service/pg-auth-gateway/Dockerfile

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          load: false
          provenance: false
          sbom: false
          tags: smith-gateway/${{ matrix.image }}:ci
